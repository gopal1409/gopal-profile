# ============================================
# Gopal Das Portfolio - Production Compose
# ============================================
version: "3.9"

services:
  portfolio:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    container_name: gopal-portfolio-prod
    ports:
      - "80:8080"
      - "443:8443"
    restart: unless-stopped
    environment:
      - NODE_ENV=production
    volumes:
      - ./nginx/ssl:/etc/nginx/ssl:ro
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 128M
    networks:
      - portfolio-network

  # Optional: Add a reverse proxy or load balancer
  # traefik:
  #   image: traefik:v3.0
  #   container_name: gopal-portfolio-traefik
  #   command:
  #     - "--api.insecure=true"
  #     - "--providers.docker=true"
  #     - "--entrypoints.web.address=:80"
  #     - "--entrypoints.websecure.address=:443"
  #   ports:
  #     - "80:80"
  #     - "443:443"
  #     - "8080:8080"
  #   volumes:
  #     - /var/run/docker.sock:/var/run/docker.sock:ro
  #   networks:
  #     - portfolio-network

networks:
  portfolio-network:
    driver: bridge