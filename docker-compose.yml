# ============================================
# Gopal Das Portfolio - Production Compose
# ============================================
version: "3.9"

services:
  app:
    image: gopal1409/gopal-portfolio:latest
    container_name: gopal-portfolio-app
    ports:
      - "80:8080"
    environment:
      - NODE_ENV=production
    networks:
      - portfolio-network
    restart: unless-stopped

networks:
  portfolio-network:
    driver: bridge