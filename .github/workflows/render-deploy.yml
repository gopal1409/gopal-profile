name: Deploy service to Render

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    name: Build and test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Run lint
        run: npm run lint

      - name: Run tests
        run: npm run test

      - name: Build production assets
        run: npm run build
        env:
          VITE_EMAILJS_SERVICE_ID: ${{ secrets.VITE_EMAILJS_SERVICE_ID }}
          VITE_EMAILJS_TEMPLATE_ID: ${{ secrets.VITE_EMAILJS_TEMPLATE_ID }}
          VITE_EMAILJS_PUBLIC_KEY: ${{ secrets.VITE_EMAILJS_PUBLIC_KEY }}

  deploy:
    name: Deploy to Render
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: render-production
      url: ${{ vars.RENDER_SITE_URL || 'https://gopal-portfolio.onrender.com' }}

    steps:
      - name: Deploy to Render
        env:
          RENDER_DEPLOY_HOOK_URL: ${{ secrets.RENDER_DEPLOY_HOOK_URL }}
          RENDER_SERVICE_ID: ${{ secrets.RENDER_SERVICE_ID }}
          RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
        run: |
          if [ -n "$RENDER_DEPLOY_HOOK_URL" ]; then
            echo "Using Render deploy hook"
            curl --fail --silent --show-error \
              -X POST "$RENDER_DEPLOY_HOOK_URL" \
              -H "Content-Type: application/json" \
              -d '{}'
          elif [ -n "$RENDER_SERVICE_ID" ] && [ -n "$RENDER_API_KEY" ]; then
            echo "Using Render service API"
            curl --fail --silent --show-error \
              -X POST "https://api.render.com/v1/services/$RENDER_SERVICE_ID/deploys" \
              -H "Authorization: Bearer $RENDER_API_KEY" \
              -H "Content-Type: application/json" \
              -d '{}'
          else
            echo "Missing Render deployment credentials. Set RENDER_DEPLOY_HOOK_URL or both RENDER_SERVICE_ID and RENDER_API_KEY."
            exit 1
          fi

      - name: Add Render URL to job summary
        env:
          RENDER_SITE_URL: ${{ vars.RENDER_SITE_URL || 'https://gopal-portfolio.onrender.com' }}
        run: |
          echo "## Render deployment" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "Site URL: $RENDER_SITE_URL" >> "$GITHUB_STEP_SUMMARY"
